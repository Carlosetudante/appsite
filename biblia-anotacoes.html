<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#071428">
  <title>Bíblia — Anotações</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="logo.png" type="image/png">
  <link rel="apple-touch-icon" href="logo.png">
</head>
<body class="bible-page">
  <div class="bible-page-header">
    <a class="bible-page-back" id="bibleBackBtn" href="index.html#home">← Voltar</a>
    <div class="bible-page-title">
      <span class="bible-page-icon">✍️</span>
      <span>Bíblia — Anotações</span>
    </div>
    <div class="bible-page-links"></div>
  </div>

  <main class="bible-page-main">
    <div class="bible-interface">
      <div id="bibleNotesError" class="bible-error-box hidden"></div>
      <div class="bible-header">
        <div class="bible-header-top">
          <div class="bible-icon">✍️</div>
          <div>
            <h2 class="bible-title">Anotações Bíblicas</h2>
            <p class="bible-subtitle">Guarde aprendizados, referências e tags.</p>
          </div>
        </div>
      </div>

      <div class="bible-notes">
        <div class="bible-notes-topline">
          <div>
            <div class="bible-notes-header">✍️ Criar anotação</div>
            <div class="bible-notes-subtitle">Registre insights, marque com tags e encontre tudo rapidamente.</div>
          </div>
          <div class="bible-notes-stats">
            <div class="bible-notes-stat">
              <span>Total</span>
              <strong id="bibleNotesCount">0</strong>
            </div>
            <div class="bible-notes-stat">
              <span>Tags</span>
              <strong id="bibleTagsCount">0</strong>
            </div>
          </div>
        </div>

        <div class="bible-notes-form">
          <label class="bible-note-field">
            <span>Referência</span>
            <input type="text" id="bibleNoteRef" class="bible-note-input" placeholder="Ex: João 3:16">
          </label>

          <label class="bible-note-field">
            <span>Anotação</span>
            <textarea id="bibleNoteContent" class="bible-note-textarea" placeholder="Escreva sua anotação..."></textarea>
          </label>
          <div class="bible-note-highlight-tools">
            <button type="button" class="ghost" id="bibleNoteHighlightBtn">🖍️ Marcar seleção</button>
            <button type="button" class="ghost" id="bibleNoteClearHighlightBtn">🧹 Limpar marcações</button>
            <span class="bible-note-highlight-hint">Selecione um trecho no texto da anotação e toque em marcar.</span>
          </div>

          <label class="bible-note-field">
            <span>Tags</span>
            <input type="text" id="bibleNoteTags" class="bible-note-input" placeholder="Ex: fé, promessa, oração">
          </label>

          <button class="btn success" id="bibleNoteSaveBtn">Salvar anotação</button>
        </div>

        <div class="bible-notes-search">
          <label class="bible-note-field">
            <span>Buscar</span>
            <input type="text" id="bibleNoteSearch" class="bible-note-input" placeholder="Buscar por referência, texto ou #tag..." list="bibleTagsDatalist">
          </label>
          <datalist id="bibleTagsDatalist"></datalist>
        </div>

        <div id="bibleTagsPanel" class="bible-note-tags-panel"></div>
        <div id="bibleNotesList" class="bible-notes-list"></div>
      </div>
    </div>
  </main>

  <script src="biblia-anotacoes.js"></script>
</body>
</html>
